# =============================================================================
# Manual QA Steps:
# =============================================================================
# 1. Apply the certificates:
#    kubectl apply -f certificates.yaml
#
# 2. Check certificate status:
#    kubectl get certificates -n anchorpoint-testnet
#
# 3. Check certificate ready status:
#    kubectl get certificates -n anchorpoint-testnet -o wide
#
# 4. View certificate details:
#    kubectl describe certificate <cert-name> -n anchorpoint-testnet
#
# 5. Check cert-manager logs for errors:
#    kubectl logs -n cert-manager -l app=cert-manager
#
# 6. Verify TLS secret was created:
#    kubectl get secret -n anchorpoint-testnet
#
# 7. Test HTTPS connection:
#    curl -v https://api.anchorpoint-testnet.example.com
#
# 8. Switch to production (after testing with staging):
#    # Update issuerRef.name to 'anchorpoint-prod-issuer' in all Certificate resources
#    # Or delete and recreate with updated references
#    kubectl patch certificate anchorpoint-api-cert -n anchorpoint-testnet \
#      --type merge -f - <<EOF
#    apiVersion: cert-manager.io/v1
#    kind: Certificate
#    spec:
#      issuerRef:
#        name: anchorpoint-prod-issuer
#    EOF
# =============================================================================