# =============================================================================
# Certificates for AnchorPoint Hostnames - Issue #419
# =============================================================================
# Certificate resources define the TLS certificates to be issued for each hostname.
# These reference the ClusterIssuer for Let's Encrypt integration.
#
# Each Certificate requires:
#   - A hostname that resolves to the cluster ingress
#   - The appropriate issuer reference
#   - Proper DNS records pointing to the ingress controller
# =============================================================================

# -----------------------------------------------------------------------------
# Certificate for API Endpoint
# Used for the API ingress hostname (api.anchorpoint-testnet.example.com)
# -----------------------------------------------------------------------------
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  # Name of the certificate resource
  name: anchorpoint-api-cert
  # Namespace where this certificate is created
  namespace: anchorpoint-testnet
  # Consistent labeling for all AnchorPoint TLS resources
  labels:
    app: anchorpoint
    component: cert-manager
    environment: testnet
    role: api
spec:
  # Reference to the ClusterIssuer (staging or production)
  issuerRef:
    name: anchorpoint-staging-issuer
    kind: ClusterIssuer
  # DNS names for the certificate - must match ingress host
  dnsNames:
    - api.anchorpoint-testnet.example.com
  # Secret where the TLS certificate will be stored
  secretName: anchorpoint-api-tls
  # Certificate duration and renewal window
  duration: 2160h  # 90 days
  renewBefore: 360h  # 15 days before expiration

