version: '3.8'

services:
  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    container_name: anchorpoint-dashboard
    ports:
      - "3000:80"
    environment:
      - NODE_ENV=production
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    networks:
      - anchorpoint-network

  postgres:
    image: postgres:16-alpine
    container_name: anchorpoint-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=anchorpoint
      - POSTGRES_PASSWORD=anchorpoint
      - POSTGRES_DB=anchorpoint
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anchorpoint"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - anchorpoint-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: anchorpoint-backend
    ports:
      - "3002:3002"
      - "9464:9464"
    environment:
      - NODE_ENV=production
      - PORT=3002
      - DATABASE_URL=postgresql://anchorpoint:anchorpoint@postgres:5432/anchorpoint
      - REDIS_URL=redis://redis:6379
      - JAEGER_ENDPOINT=http://jaeger:14268/api/traces
      - PROMETHEUS_METRICS_PORT=9464
      - OTEL_SERVICE_NAME=anchorpoint-backend
      - OTEL_RESOURCE_ATTRIBUTES=service.name=anchorpoint-backend,service.version=1.0.0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3002/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - anchorpoint-network

  redis:
    image: redis:7-alpine
    container_name: anchorpoint-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    networks:
      - anchorpoint-network

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: anchorpoint-jaeger
    ports:
      - "16686:16686"  # Jaeger UI
      - "14268:14268"  # HTTP collector
      - "14250:14250"  # gRPC collector
      - "6831:6831/udp" # UDP agent
      - "6832:6832/udp" # UDP agent
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    restart: unless-stopped
    networks:
      - anchorpoint-network

  prometheus:
    image: prom/prometheus:latest
    container_name: anchorpoint-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    networks:
      - anchorpoint-network

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  prometheus-data:
    driver: local

networks:
  anchorpoint-network:
    driver: bridge
